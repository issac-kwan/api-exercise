services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  classifier-service:
    build:
      context: .
    command: ["npm", "start", "fake"]

  gateway:
    build:
      context: ./gateway
    environment:
      GATEWAY_PORT: "8080"
      DOWNSTREAM_URL: http://classifier-service:3000
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_FAIL_MODE: closed
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      classifier-service:
        condition: service_started
  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver' # lets k6 push its own metrics here too
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" 
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    depends_on:
      - prometheus
    restart: unless-stopped